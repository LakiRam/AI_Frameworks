<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SOA Retail Agent</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 980px; margin: 2rem auto; padding: 0 1rem; }
  h1 { margin-bottom: 0; }
  .sub { color: #888; margin-top: 0.2rem; }
  form { display: grid; gap: 0.6rem; margin-top: 1.2rem; padding: 1rem;
         border: 1px solid #44444433; border-radius: 8px; }
  input, textarea, button, select { font: inherit; padding: 0.5rem; border-radius: 6px;
        border: 1px solid #88888855; background: transparent; color: inherit; }
  button { background: #2d6cdf; color: white; border: none; cursor: pointer; }
  button.warn { background: #c45a00; }
  pre  { background: #1112; padding: 0.8rem; border-radius: 6px; overflow: auto; max-height: 480px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px;
          font-size: 0.8rem; background: #ffae0033; }
  .risk-HIGH   { background: #ff404033; }
  .risk-MEDIUM { background: #ffae0033; }
  .risk-LOW    { background: #44cc4433; }
  .card { border: 1px solid #44444433; border-radius: 8px; padding: 0.8rem; margin: 0.5rem 0; }
</style>
</head>
<body>

<h1>SOA Retail Agent</h1>
<p class="sub">Smart Operations Agent &mdash; LangGraph + Ollama + HITL</p>

<form id="run-form">
  <label>Operational request
    <textarea name="request_text" rows="3" required
      placeholder="e.g. Heatwave warning in Mumbai — handle demand spike for cold beverages">Heatwave warning in Mumbai. Make sure we don't stock out on cold beverages and consider a promo for loyalty customers.</textarea>
  </label>
  <div class="row">
    <label>Store ID <input name="store_id" value="S001"></label>
    <label>City    <input name="city" value="Mumbai"></label>
  </div>
  <button type="submit">Run agent</button>
</form>

<div id="output"></div>

<script>
async function postForm(url, formData) {
  const r = await fetch(url, { method: "POST", body: formData });
  return r.json();
}

function renderState(data) {
  const out = document.getElementById("output");
  const s = data.state || {};
  const findings = (s.findings || []).map(f => `
    <div class="card">
      <strong>${f.agent}</strong>
      <span class="pill risk-${f.risk}">risk ${f.risk}</span>
      ${f.requires_approval ? '<span class="pill">requires approval</span>' : ''}
      <pre>${(f.summary || '').replace(/</g,'&lt;')}</pre>
    </div>
  `).join("");

  const approveBox = data.paused ? `
    <form id="approve-form" style="margin-top:1rem">
      <input type="hidden" name="thread_id" value="${data.thread_id}">
      <div class="row">
        <button name="approved" value="true">Approve &amp; resume</button>
        <button class="warn" name="approved" value="false">Reject</button>
      </div>
    </form>` : "";

  out.innerHTML = `
    <h2>Thread <code>${data.thread_id}</code> ${data.paused ? '<span class="pill">PAUSED</span>' : '<span class="pill risk-LOW">COMPLETE</span>'}</h2>
    ${findings || '<em>No findings.</em>'}
    ${s.plan ? `<h3>Final plan</h3><pre>${s.plan.replace(/</g,'&lt;')}</pre>` : ''}
    ${approveBox}
  `;

  if (data.paused) {
    document.getElementById("approve-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const btn = ev.submitter;
      const fd = new FormData(ev.target);
      fd.set("approved", btn.value);
      const result = await postForm("/approve", fd);
      renderState(result);
    });
  }
}

document.getElementById("run-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  document.getElementById("output").innerHTML = "<em>Running…</em>";
  const fd = new FormData(ev.target);
  const result = await postForm("/run", fd);
  renderState(result);
});
</script>

</body>
</html>
