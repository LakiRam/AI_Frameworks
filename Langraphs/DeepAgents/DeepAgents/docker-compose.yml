services:
  ollama:
    image: ollama/ollama:latest
    container_name: soa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

  soa-retail-agent:
    build: .
    container_name: soa-retail-agent
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
      LLM_TEMPERATURE: "0.2"
      APPROVAL_REQUIRED: "true"
      CHECKPOINT_DB: /data/checkpoints.sqlite
    volumes:
      - soa-data:/data

volumes:
  ollama-data:
  soa-data:
